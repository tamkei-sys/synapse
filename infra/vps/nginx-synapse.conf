# SYNAPSE on the shared VPS — port-based vhost (ADR-0013).
# Installed to /etc/nginx/sites-available/synapse by infra/vps/setup.sh.
#
# Everything lives behind ONE origin (:8081): static web bundle, API and the
# Yjs websocket. Same-origin means no CORS preflights and first-party cookies,
# mirroring how the eventual Workers production sits behind a single domain.
server {
    listen 8081;
    listen [::]:8081;
    server_name _;

    root /var/www/synapse;
    index index.html;

    client_max_body_size 10m;

    # Fingerprinted Vite assets: cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA with client-side routing.
    location / {
        try_files $uri /index.html;
    }

    # ---- API (Hono on 127.0.0.1:8790) -------------------------------------
    location /trpc/ {
        proxy_pass http://127.0.0.1:8790;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8790;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8790;
        proxy_set_header Host $host;
    }

    # ---- Yjs websocket (Hocuspocus on 127.0.0.1:8791) ----------------------
    location /sync {
        proxy_pass http://127.0.0.1:8791;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Collaborative sessions stay open for hours; don't let the 60s
        # default reap healthy connections.
        proxy_read_timeout 4h;
        proxy_send_timeout 4h;
    }
}
