name: 🐛 Bug report
description: Something is broken
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please give us enough to reproduce.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug
      placeholder: When I click X, Y happens, but I expected Z
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SYNAPSE version (or commit SHA)
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser (if applicable)
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other / N/A

  - type: textarea
    id: logs
    attributes:
      label: Console / network logs
      description: Paste relevant logs. Redact anything sensitive.
      render: text

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: This is not a security issue (if it is, email the maintainers privately instead)
          required: true
