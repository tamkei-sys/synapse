name = "synapse-api"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Non-secret config — secrets (DATABASE_URL, BETTER_AUTH_SECRET) are managed
# via `wrangler secret put` and surfaced through `c.env.<NAME>` only.
[vars]
BETTER_AUTH_URL = "http://localhost:8787"
WEB_ORIGIN = "http://localhost:5173"

# Additional bindings (KV / D1 / R2 / Queues) will be added as features land.

# ---- cc Container (PBI-19) ------------------------------------------------
# 本番デプロイ時に下記を有効化する。dev では undefined のままで sandbox-stub
# にフォールバックする (apps/api/src/integrations/cc/container.ts)。
#
# [[containers]]
# class_name    = "CcContainer"
# image         = "synapse-cc"        # apps/cc-container/ で build
# max_instances = 5                    # workspace x parallel cap
# instance_type = "small"
#
# [durable_objects]
# bindings = [
#   { name = "CC_CONTAINER", class_name = "CcContainer" },
# ]
#
# 併せて wrangler secret put CC_SESSION_TOKEN_SECRET し、vars に
# CC_API_BASE = "https://api.synapse.example" を入れる。
# 詳細は docs/adr/0007-cc-container-sandbox.md.
